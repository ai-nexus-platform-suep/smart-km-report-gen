# Nacos Data ID: gateway
# Group: DEFAULT_GROUP
# Format: Properties

spring.application.name=gateway

server.port=8088
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8

spring.cloud.nacos.discovery.enabled=true
spring.cloud.nacos.discovery.group=DEFAULT_GROUP

spring.cloud.gateway.discovery.locator.enabled=false

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/power_report?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=your-mysql-username
spring.datasource.password=your-mysql-password
spring.datasource.hikari.initialization-fail-timeout=-1

spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=5s
spring.data.redis.repositories.enabled=false
#spring.data.redis.password=your-redis-password

mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

app.jwt.secret=replace-with-base64-256-bit-secret
app.jwt.access-token-expiration=86400
app.jwt.refresh-token-expiration=604800
app.jwt.issuer=tech-supervision-platform

app.gateway.public-paths[0]=/api/auth/**
app.gateway.public-paths[1]=/api/health
app.gateway.public-paths[2]=/api/content/health
app.gateway.public-paths[3]=/api/admin/health

app.gateway.admin-paths[0]=/api/admin/**
app.gateway.admin-roles[0]=ROLE_ADMIN
app.gateway.admin-roles[1]=ROLE_SUPER_ADMIN

spring.cloud.gateway.routes[0].id=report-outline-docx
spring.cloud.gateway.routes[0].uri=lb://report-outline-docx
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/reports/outline/**,/api/reports/{reportId}/export/**,/api/reports/files/**,/api/health
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[1].id=report-content-flow
spring.cloud.gateway.routes[1].uri=lb://report-content-flow
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/reports/{reportId}/sections/**,/api/reports/history,/api/reports/history/**,/api/content/health
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[2].id=report-admin
spring.cloud.gateway.routes[2].uri=lb://report-admin
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/admin/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0
