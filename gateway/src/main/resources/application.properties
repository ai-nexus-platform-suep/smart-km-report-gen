spring.application.name=gateway

server.port=8088

# ========== Nacos 配置（开发阶段禁用，使用静态路由） ==========
spring.cloud.nacos.discovery.enabled=false
spring.cloud.nacos.config.enabled=false
spring.config.import=

# ========== JWT 配置 ==========
# 随机生成的 256 位 Base64 密钥，请勿提交至 Git
app.jwt.secret=/O+iqksxQ8P7xHjF9z0bxKXvEClBvG3ORdIdL440AA0=
app.jwt.access-token-expiration=86400
app.jwt.refresh-token-expiration=604800
app.jwt.issuer=tech-supervision-platform

# ========== 网关白名单配置 ==========
# 无需 JWT 鉴权的公开接口（Ant 路径匹配模式）
app.gateway.public-paths[0]=/api/auth/**
app.gateway.public-paths[1]=/api/health

# ========== MySQL 数据源配置 ==========
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/tech_supervision?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1166
spring.datasource.hikari.initialization-fail-timeout=-1

# ========== MyBatis-Plus 配置 ==========
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# ========== Redis 配置（开发阶段禁用） ==========
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=5s
spring.data.redis.repositories.enabled=false

# ========== Gateway 配置 ==========
spring.cloud.gateway.discovery.locator.enabled=false

# ========== 开发阶段：禁用 Java 配置的路由（lb:// 需要 Nacos），改用静态路由 ==========
# 后端1（大纲+导出）默认端口 8081
spring.cloud.gateway.routes[0].id=report-outline-docx
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/reports/outline/**,/api/reports/{reportId}/export/**,/api/reports/files/**,/api/health
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

# 后端2（SSE流式）默认端口 8082
spring.cloud.gateway.routes[1].id=report-stream
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/reports/{reportId}/sections/**,/api/reports/history/**,/api/admin/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0



