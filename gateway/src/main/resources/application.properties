spring.application.name=gateway

server.port=8088

# ========== Nacos 配置 ==========
spring.config.import=optional:nacos:gateway?group=DEFAULT_GROUP&refreshEnabled=true
spring.cloud.nacos.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.config.enabled=true
spring.cloud.nacos.config.group=DEFAULT_GROUP
spring.cloud.nacos.config.file-extension=properties

spring.cloud.nacos.discovery.enabled=true
spring.cloud.nacos.discovery.group=DEFAULT_GROUP

# ========== JWT 配置 ==========
app.jwt.secret=dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGp3dCB0b2tlbiAyNTYgYml0cyBsb25nAAAAAAAAAAA=
app.jwt.access-token-expiration=86400
app.jwt.refresh-token-expiration=604800
app.jwt.issuer=tech-supervision-platform

# ========== 网关白名单配置 ==========
# 无需 JWT 鉴权的公开接口（Ant 路径匹配模式）
app.gateway.public-paths[0]=/api/auth/**
app.gateway.public-paths[1]=/api/health

# ========== Redis 配置 ==========
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=5s

# ========== Gateway 配置 ==========
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
