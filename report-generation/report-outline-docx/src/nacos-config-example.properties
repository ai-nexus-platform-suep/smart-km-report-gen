# Nacos Data ID: report-outline-docx
# Group: DEFAULT_GROUP
# Format: Properties

server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/power_report?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=your-mysql-username
spring.datasource.password=your-mysql-password
spring.datasource.hikari.initialization-fail-timeout=-1

spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=5s
#spring.data.redis.password=your-redis-password

mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=input

app.report.export-dir=./storage/reports
app.report.template-enabled=true
app.report.template-storage-dir=./storage/templates
app.report.minio.endpoint=http://127.0.0.1:9005
app.report.minio.access-key=your-minio-access-key
app.report.minio.secret-key=your-minio-secret-key
app.report.minio.bucket-name=report-templates
app.report.prefer-template-header-footer=true
app.report.header-enabled=true
app.report.footer-enabled=true
app.report.render-report-header=true
app.report.header-text={reportName}
app.report.footer-text=\u7B2C {page} \u9875 / \u5171 {pages} \u9875
app.report.body-font=\u4EFF\u5B8B_GB2312
app.report.title-font=\u9ED1\u4F53
app.report.title-font-size=22
app.report.heading1-font-size=16
app.report.heading2-font-size=14
app.report.heading3-font-size=12
app.report.body-font-size=12
app.report.caption-font-size=10
app.report.table-font-size=11
app.report.margin-top-twips=1440
app.report.margin-bottom-twips=1440
app.report.margin-left-twips=1584
app.report.margin-right-twips=1584

app.ai.outline-url=http://127.0.0.1:9000/api/ai/outline/generate
app.ai.timeout-seconds=60
app.ai.outline-temp-ttl-seconds=1800
app.ai.fallback-enabled=true
