# Nacos Data ID: report-admin
# Group: DEFAULT_GROUP
# Format: Properties

server.port=8083
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/power_report?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=your-mysql-username
spring.datasource.password=your-mysql-password
spring.datasource.hikari.initialization-fail-timeout=-1

mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=input

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# Template file storage.
# MINIO is recommended for team deployment. LOCAL is only kept for old local test data.
app.template.storage-type=MINIO
app.template.storage-dir=./storage/templates
# The Python AI service often uses 9000 in this project; map MinIO API to another local port if needed.
app.template.minio.endpoint=http://127.0.0.1:9005
app.template.minio.access-key=your-minio-access-key
app.template.minio.secret-key=your-minio-secret-key
app.template.minio.bucket-name=report-templates
app.template.minio.object-prefix=templates
app.template.minio.auto-create-bucket=true

# Asset file storage.
app.asset.storage-type=MINIO
app.asset.storage-dir=./storage/assets
app.asset.seed-dir=./\u9879\u76EE\u7D20\u6750
app.asset.minio.endpoint=http://127.0.0.1:9005
app.asset.minio.access-key=your-minio-access-key
app.asset.minio.secret-key=your-minio-secret-key
app.asset.minio.bucket-name=report-assets
app.asset.minio.object-prefix=assets
app.asset.minio.auto-create-bucket=true

app.ai.api-url=http://127.0.0.1:9000
app.ai.api-key=
app.ai.model-name=deepseek-chat
app.ai.timeout-seconds=240

app.monitor.timeout-millis=2000
app.monitor.health-targets[0].code=outlineDocx
app.monitor.health-targets[0].label=\u5927\u7EB2\u4E0EDOCX\u5BFC\u51FA\u670D\u52A1
app.monitor.health-targets[0].url=http://127.0.0.1:8080/api/health
app.monitor.health-targets[1].code=contentFlow
app.monitor.health-targets[1].label=\u6B63\u6587\u751F\u6210\u4E0E\u5386\u53F2\u670D\u52A1
app.monitor.health-targets[1].url=http://127.0.0.1:8081/api/content/health
app.monitor.health-targets[2].code=reportAdmin
app.monitor.health-targets[2].label=\u62A5\u544A\u540E\u53F0\u7BA1\u7406\u670D\u52A1
app.monitor.health-targets[2].url=http://127.0.0.1:8083/api/admin/health