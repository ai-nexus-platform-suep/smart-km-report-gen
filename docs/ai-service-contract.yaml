              $ref: "#/components/schemas/VectorSearchRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVectorSearch"

components:
  schemas:
    ApiResponseBase:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
        message:
          type: string

    ApiResponseHealth:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              properties:
                service:
                  type: string
                  example: km-ai-service
                status:
                  type: string
                  example: UP

    ChunkStrategy:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [heading, fixed_size]
        chunkSize:
          type: integer
          default: 512
        overlap:
          type: integer
          default: 50
        separator:
          type: string
          default: "\n\n"
        recursiveMerge:
          type: boolean
          default: false

    ProcessDocumentRequest:
      type: object
      required: [documentId, kbId, minioPath, chunkStrategy]
      properties:
        documentId:
          type: string
          format: uuid
        kbId:
          type: string
          format: uuid
        minioPath:
          type: string
          description: MinIO 瀵硅薄璺緞
        mimeType:
          type: string
        chunkStrategy:
          $ref: "#/components/schemas/ChunkStrategy"
        callbackUrl:
          type: string
          description: Java 鐘舵€佸洖璋冿紝濡?http://km-backend:8091/internal/document/status

    ProcessDocumentResult:
      type: object
      properties:
        documentId:
          type: string
        chunkCount:
          type: integer
        status:
          type: string
          enum: [READY, FAILED]
        errorMsg:
          type: string

    ApiResponseProcessDocument:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ProcessDocumentResult"

    EmbedRequest:
      type: object
      required: [texts]
      properties:
        texts:
          type: array
          items:
            type: string
        model:
          type: string
          description: 鍙€夛紝榛樿璇?Nacos/鐜鍙橀噺

    EmbedResult:
      type: object
      properties:
        vectors:
          type: array
          items:
            type: array
            items:
              type: number
              format: float
        dimension:
          type: integer

    ApiResponseEmbed:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/EmbedResult"

    RerankRequest:
      type: object
      required: [query, passages]
      properties:
        query:
          type: string
        passages:
          type: array
          items:
            type: string
        topK:
          type: integer
          default: 10
        model:
          type: string

    RerankItem:
      type: object
      properties:
        index:
          type: integer
          description: 瀵瑰簲 passages 涓嬫爣
        score:
          type: number
          format: float

    RerankResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RerankItem"

    ApiResponseRerank:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/RerankResult"

    VectorSearchRequest:
      type: object
      required: [query, knowledgeBaseIds]
      properties:
        query:
          type: string
        knowledgeBaseIds:
          type: array
          items:
            type: string
        topK:
          type: integer
          default: 20
        similarityThreshold:
          default: 0.6
        tagFilters:
          type: object
          additionalProperties:
            type: string
          description: 标签过滤器，对应 EPIC-05 05.1
          type: number
          format: float
          default: 0.6

    VectorSearchHit:
      type: object
      properties:
        chunkId:
          type: string
        documentId:
          type: string
        content:
          type: string
        chapterPath:
          type: string
        similarityScore:
        chunkType:
          type: string
          description: 切片类型（paragraph/section/chapter），对应 EPIC-05 05.3
          type: number
          format: float

    VectorSearchResult:
      type: object
      properties:
        hits:
          type: array
          items:
            $ref: "#/components/schemas/VectorSearchHit"

    ApiResponseVectorSearch:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/VectorSearchResult"
