      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseHealth"

  /internal/process/document:
    post:
      tags: [process]
      summary: 澶勭悊鍗曚釜鏂囨。锛堝紓姝ユ帹鑽愶級
      description: |
        瀹屾暣绠＄嚎锛氳 MinIO 鈫?瑙ｆ瀽 鈫?chunk 鈫?embed 鈫?鍐?Milvus 鈫?鍥炲啓 chunk 鍏冩暟鎹€?
        鍙敱 RabbitMQ 娑堣垂鑰呭唴閮ㄨ皟鐢紱涔熷彲 Java 鐩存帴 HTTP 瑙﹀彂銆?
