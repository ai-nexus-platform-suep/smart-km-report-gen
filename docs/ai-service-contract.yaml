  /internal/rerank:
    post:
      tags: [rerank]
      summary: 閲嶆帓搴?
      operationId: rerankPassages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RerankRequest"
