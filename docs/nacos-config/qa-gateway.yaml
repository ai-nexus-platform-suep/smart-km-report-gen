# ============================================
# Nacos 配置: qa-gateway.yaml
# data_id: qa-gateway.yaml
# group:   DEFAULT_GROUP
# ============================================

spring:
  cloud:
    gateway:
      routes:
        - id: auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: qa-agent
          uri: http://localhost:8000
          predicates:
            - Path=/api/conversations/**,/api/chat/**
        - id: qa-chat-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/model-configs/**,/api/stats/qa/**
        - id: report
          uri: http://localhost:8092
          predicates:
            - Path=/api/reports/**,/api/admin/**,/api/health
        - id: km
          uri: http://localhost:8091
          predicates:
            - Path=/api/knowledge-bases/**,/api/documents/**,/api/search,/api/stats/summary

server:
  port: 8080

logging:
  level:
    com.qa.gateway: INFO
    org.springframework.cloud.gateway: INFO

app:
  jwt:
    secret: ${JWT_SECRET:/O+iqksxQ8P7xHjF9z0bxKXvEClBvG3ORdIdL440AA0=}
    issuer: tech-supervision-platform
  gateway:
    public-paths:
      - /api/auth/captcha
      - /api/auth/register/send-code
      - /api/auth/register
      - /api/auth/login
      - /api/auth/refresh
      - /api/health
