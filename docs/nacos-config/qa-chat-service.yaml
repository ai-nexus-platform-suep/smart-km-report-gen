# ============================================
# Nacos 配置: qa-chat-service.yaml
# data_id: qa-chat-service.yaml
# group:   DEFAULT_GROUP
# ============================================

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/smart_km_report_gen?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8090

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

model-config:
  aes-key: ${AES_KEY:smart-km-report-gen-2026-aes-key}
  default-timeout-seconds: 60
